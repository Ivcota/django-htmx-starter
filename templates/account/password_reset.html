{% load allauth %}

<c-layout title="Reset Password" body_class="font-body m-0 antialiased">

    <div class="flex-1 flex items-center justify-center px-6 py-12" style="background-color: var(--navy-950);">
        <c-auth-card title="Reset Password">
            <p class="text-center mb-6" style="color: var(--slate-400);">Enter your email address and we'll send you a link to reset your password.</p>
            <form method="post" action="{% url 'account_reset_password' %}">
                {% csrf_token %}
                {% if form.non_field_errors %}
                    <div class="mb-4 p-3 rounded-lg border" style="background-color: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3);">
                        {% for error in form.non_field_errors %}
                            <p class="text-sm text-red-400">{{ error }}</p>
                        {% endfor %}
                    </div>
                {% endif %}
                {% for field in form %}
                    <c-form-field :field="field" />
                {% endfor %}
                <button type="submit"
                        class="cta-primary w-full inline-flex items-center justify-center px-8 py-3 text-sm font-semibold rounded-lg tracking-wide cursor-pointer"
                        style="background-color: var(--amber-500); color: var(--navy-950);">
                    Send Reset Link
                </button>
            </form>
            <div class="mt-6 text-center text-sm" style="color: var(--slate-400);">
                <p>
                    Remember your password?
                    <a href="{% url 'account_login' %}" class="font-medium hover:underline" style="color: var(--amber-400);">Sign in</a>
                </p>
            </div>
        </c-auth-card>
    </div>
</c-layout>
