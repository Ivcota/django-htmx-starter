<c-layout title="Password Reset Sent" body_class="font-body m-0 antialiased">

    <div class="flex-1 flex items-center justify-center px-6 py-12" style="background-color: var(--navy-950);">
        <c-auth-card title="Check Your Email">
            <p class="text-center mb-6" style="color: var(--slate-400);">
                We've sent you an email with a link to reset your password. Please check your inbox.
            </p>
            <div class="text-center">
                <a href="{% url 'account_login' %}" class="font-medium text-sm hover:underline" style="color: var(--amber-400);">
                    Back to sign in
                </a>
            </div>
        </c-auth-card>
    </div>
</c-layout>
